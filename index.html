<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <title>F1 Drivers</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0a10'/%3E%3Cpath d='M5 22 Q12 22 16 12 T27 9' fill='none' stroke='%23e10600' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <meta
      name="description"
      content="An interactive visualization of Formula 1 drivers and how they moved between teams, season by season."
    />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <div class="brand">
          <h1>F1&nbsp;Drivers</h1>
        </div>
        <a
          class="gh-link"
          href="https://github.com/lbussell/f1-drivers"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="View the source on GitHub"
        >
          <svg viewBox="0 0 16 16" width="24" height="24" fill="currentColor" aria-hidden="true">
            <path
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"
            />
          </svg>
        </a>
      </header>

      <main id="stage">
        <div id="viewport" tabindex="0" aria-label="Season timeline. Use arrow keys to change year.">
          <div id="world">
            <svg id="lines" aria-hidden="true"></svg>
            <div id="pucks"></div>
            <div id="year-axis"></div>
          </div>
        </div>

        <button id="nav-prev" class="year-nav" aria-label="Previous season">&#x2039;</button>
        <button id="nav-next" class="year-nav" aria-label="Next season">&#x203A;</button>

        <div class="sort-toggle" role="radiogroup" aria-label="Sort drivers by">
          <button class="sort-btn is-active" data-mode="drivers" role="radio" aria-checked="true">
            Drivers&rsquo;
          </button>
          <button class="sort-btn" data-mode="constructors" role="radio" aria-checked="false">
            Constructors&rsquo;
          </button>
          <span class="sort-pill" aria-hidden="true"></span>
        </div>

        <div id="tooltip" role="status" aria-live="polite" hidden></div>
      </main>

      <aside id="flyout" aria-hidden="true" role="dialog" aria-label="Driver details">
        <button id="flyout-close" aria-label="Close driver details">&times;</button>
        <div id="flyout-content"></div>
      </aside>
      <div id="flyout-backdrop" hidden></div>

      <div id="loading">
        <div class="loading-lights" aria-hidden="true">
          <i></i><i></i><i></i><i></i><i></i>
        </div>
        <p>Forming up on the grid&hellip;</p>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
